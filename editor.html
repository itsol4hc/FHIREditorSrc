<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klinický FHIR Editor</title>
    <meta name="description" content="WYSIWYG editor klinických záznamů s podporou FHIR R4">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Quill.js 2.x -->
    <link href="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.js"></script>

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- CodeMirror 5 (syntax highlighting for code editor & JSON preview) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/theme/material-darker.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/htmlmixed/htmlmixed.min.js"></script>

    <!-- Editor styles -->
    <link rel="stylesheet" href="editor.css">
</head>
<body>

    <div id="editor-wrapper">
        <div id="toolbar">
            <!-- IO tools -->
            <button class="action-btn" id="btn-load" title="Načíst FHIR Bundle (JSON)">
                <i class="fa-solid fa-folder-open"></i>
            </button>
            <button class="action-btn" id="btn-save" title="Uložit jako FHIR Bundle">
                <i class="fa-solid fa-floppy-disk"></i>
            </button>
            <input type="file" id="file-input" style="display: none;" accept=".json">

            <div class="toolbar-divider"></div>

            <!-- Insert clinical data -->
            <button class="action-btn" id="btn-insert" title="Vložit klinický údaj (Ctrl+.)">
                <i class="fa-solid fa-notes-medical text-blue-600"></i>
            </button>
            <button class="action-btn" id="btn-insert-section" title="Vložit sekci (F2)">
                <i class="fa-solid fa-layer-group text-emerald-600"></i>
            </button>

            <div class="toolbar-divider"></div>

            <!-- Quill formatting -->
            <span class="ql-formats">
                <button class="ql-bold"></button>
                <button class="ql-italic"></button>
                <button class="ql-underline"></button>
            </span>
            <span class="ql-formats">
                <button class="ql-list" value="ordered"></button>
                <button class="ql-list" value="bullet"></button>
            </span>

            <div class="toolbar-divider"></div>

            <!-- Code editor, JSON preview, Print, Validator link -->
            <button class="action-btn" id="btn-edit-code" title="Editovat HTML kód editoru">
                <i class="fa-solid fa-code"></i>
            </button>
            <button class="action-btn" id="btn-show-json" title="Zobrazit FHIR Bundle (JSON)">
                <i class="fa-solid fa-file-code text-emerald-600"></i>
            </button>
            <button class="action-btn" id="btn-print-report" title="Zobrazit zprávu pro tisk">
                <i class="fa-solid fa-print text-slate-600"></i>
            </button>
            <a href="https://inferno.healthit.gov/validator/" target="_blank" rel="noopener noreferrer" class="toolbar-link" title="Otevřít FHIR Validátor (Inferno)">
                <span class="action-btn">
                    <i class="fa-solid fa-shield-halved text-amber-600"></i>
                </span>
            </a>
        </div>

        <div id="editor-container"></div>
    </div>

    <div id="floating-ui" tabindex="-1"></div>
    <div id="toast"></div>

    <!-- Scripts: order matters (dependencies first) -->
    <script src="mockPatient.js"></script>
    <script src="mockHealthCareProvider.js"></script>
    <script src="FHIRTemplates.js"></script>
    <script src="FHIRBundleBuilder.js"></script>
    <script src="FHIREditor.js"></script>
</body>
</html>
